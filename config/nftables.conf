#!/usr/sbin/nft -f

# ShadowMeld — NSM sensor firewall (hardened, IPv4-only)

flush ruleset

define mgmt_if    = "enp1s0"        # out-of-band management
define capture_if = "enp4s0"        # mirror / capture, no IP
define mgmt_host  = 10.10.10.1      # workstation — the only SSH source (static NAT-link phase)

table inet filter {

    chain input {
        type filter hook input priority filter; policy drop;

        # Mirrored traffic: drop before conntrack so the conntrack table never
        # fills with flows that aren't ours. Capture via AF_PACKET is unaffected.
        iifname $capture_if drop

        # Loopback
        iifname "lo" accept
        iifname != "lo" ip daddr 127.0.0.0/8 drop

        # Replies to our own connections + their ICMP errors (incl. PMTUD)
        ct state established,related accept
        ct state invalid drop

        # SSH — management interface
        iifname $mgmt_if ip saddr $mgmt_host tcp dport 22 ct state new accept

        # Default policy drops everything else: no open ports, no ping reply.
    }

    chain forward {
        type filter hook forward priority filter; policy drop;
        # The sensor is an endpoint, not a router.
    }

    chain output {
        type filter hook output priority filter; policy accept;

        # Never transmit on the capture interface — keep the tap silent.
        oifname $capture_if drop
    }
}
